<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Recovery Capital Checklist</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html{-webkit-text-size-adjust:100%;}
body{font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;background:#f5f4f0;color:#1a1a18;padding-bottom:120px;}

.topbar{position:-webkit-sticky;position:sticky;top:0;z-index:50;background:#ffffff;border-bottom:1px solid #d3d1c7;padding:14px 18px;display:-webkit-flex;display:flex;-webkit-align-items:center;align-items:center;-webkit-justify-content:space-between;justify-content:space-between;}
.topbar-title{font-size:17px;font-weight:700;color:#1a1a18;}
.topbar-score{font-size:16px;font-weight:700;color:#1D9E75;}

.page{padding:16px;max-width:860px;margin:0 auto;}

.card{background:#ffffff;border:1px solid #d3d1c7;border-radius:14px;padding:16px;margin-bottom:14px;}
.card-title{font-size:12px;font-weight:700;color:#888780;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:12px;}

.field{margin-bottom:12px;}
.field:last-child{margin-bottom:0;}
.field label{display:block;font-size:14px;color:#5f5e5a;margin-bottom:5px;}
.field input{display:block;width:100%;padding:12px 14px;border:1px solid #d3d1c7;border-radius:10px;font-size:16px;font-family:inherit;background:#faf9f6;color:#1a1a18;-webkit-appearance:none;appearance:none;}
.field input:focus{outline:none;border-color:#1D9E75;}

.srow{display:-webkit-flex;display:flex;-webkit-align-items:center;align-items:center;gap:10px;margin-bottom:10px;}
.slabel{font-size:14px;color:#5f5e5a;width:90px;-webkit-flex-shrink:0;flex-shrink:0;}
.strack{-webkit-flex:1;flex:1;height:8px;background:#e8e6e0;border-radius:4px;overflow:hidden;}
.sfill{height:100%;border-radius:4px;-webkit-transition:width 0.3s;transition:width 0.3s;background:#1D9E75;}
.snum{font-size:13px;font-weight:600;color:#1a1a18;min-width:38px;text-align:right;}
.odivider{border-top:1px solid #e8e6e0;margin:10px 0 12px;}
.orow{display:-webkit-flex;display:flex;-webkit-align-items:center;align-items:center;gap:10px;}
.olabel{font-size:15px;font-weight:700;color:#1a1a18;width:90px;-webkit-flex-shrink:0;flex-shrink:0;}
.otrack{-webkit-flex:1;flex:1;height:10px;background:#e8e6e0;border-radius:5px;overflow:hidden;}
.ofill{height:100%;border-radius:5px;-webkit-transition:width 0.3s;transition:width 0.3s;background:#1D9E75;}
.onum{font-size:17px;font-weight:700;color:#1D9E75;min-width:52px;text-align:right;}

.dcard{background:#ffffff;border:1px solid #d3d1c7;border-radius:14px;margin-bottom:14px;overflow:hidden;}
.dhead{display:-webkit-flex;display:flex;-webkit-align-items:center;align-items:center;gap:12px;padding:16px;cursor:pointer;-webkit-user-select:none;user-select:none;min-height:68px;}
.dicon{width:40px;height:40px;border-radius:10px;display:-webkit-flex;display:flex;-webkit-align-items:center;align-items:center;-webkit-justify-content:center;justify-content:center;-webkit-flex-shrink:0;flex-shrink:0;font-size:20px;}
.dmeta{-webkit-flex:1;flex:1;}
.dname{font-size:16px;font-weight:700;color:#1a1a18;}
.dsub{font-size:13px;color:#888780;margin-top:2px;}
.dbadge{font-size:13px;font-weight:700;padding:5px 11px;border-radius:20px;background:#f1efe8;color:#5f5e5a;-webkit-flex-shrink:0;flex-shrink:0;}
.dbadge.done{background:#E1F5EE;color:#0F6E56;}
.dchev{font-size:12px;color:#b4b2a9;margin-left:4px;-webkit-flex-shrink:0;flex-shrink:0;-webkit-transition:-webkit-transform 0.2s;transition:transform 0.2s;}
.dchev.open{-webkit-transform:rotate(180deg);transform:rotate(180deg);}

.dbody{display:none;border-top:1px solid #f1efe8;}
.dbody.open{display:block;}

.irow{display:-webkit-flex;display:flex;-webkit-align-items:flex-start;align-items:flex-start;gap:14px;padding:14px 16px;border-bottom:1px solid #f1efe8;min-height:56px;cursor:pointer;}
.irow:last-of-type{border-bottom:none;}
.ichk{width:26px;height:26px;border:2px solid #d3d1c7;border-radius:7px;-webkit-flex-shrink:0;flex-shrink:0;margin-top:1px;display:-webkit-flex;display:flex;-webkit-align-items:center;align-items:center;-webkit-justify-content:center;justify-content:center;-webkit-transition:all 0.15s;transition:all 0.15s;background:#fff;}
.ichk.on{background:#1D9E75;border-color:#1D9E75;}
.ichk.on::after{content:'';display:block;width:7px;height:11px;border:2.5px solid #fff;border-top:none;border-left:none;-webkit-transform:rotate(45deg) translate(-1px,-1px);transform:rotate(45deg) translate(-1px,-1px);}
.itxt{font-size:15px;color:#1a1a18;line-height:1.55;-webkit-flex:1;flex:1;padding-top:3px;}
.itxt.on{color:#b4b2a9;text-decoration:line-through;}

.nwrap{padding:14px 16px 16px;border-top:1px solid #f1efe8;background:#faf9f6;}
.nlabel{font-size:12px;font-weight:700;color:#888780;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:8px;}
textarea{display:block;width:100%;min-height:84px;font-size:15px;padding:10px 12px;border:1px solid #d3d1c7;border-radius:10px;background:#fff;color:#1a1a18;resize:vertical;font-family:inherit;line-height:1.6;-webkit-appearance:none;appearance:none;}
textarea:focus{outline:none;border-color:#1D9E75;}

.bottombar{position:fixed;bottom:0;left:0;right:0;background:#ffffff;border-top:1px solid #d3d1c7;padding:12px 16px 28px;display:-webkit-flex;display:flex;gap:10px;z-index:50;}
.btn{-webkit-flex:1;flex:1;padding:15px 10px;font-size:15px;border-radius:12px;cursor:pointer;font-family:inherit;font-weight:700;border:none;text-align:center;-webkit-appearance:none;}
.btn:active{opacity:0.7;}
.btnp{background:#1D9E75;color:#fff;}
.btng{background:#e8e6e0;color:#1a1a18;}

.overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.45);z-index:100;display:none;-webkit-align-items:flex-end;align-items:flex-end;}
.overlay.open{display:-webkit-flex;display:flex;}
.sheet{background:#fff;border-radius:22px 22px 0 0;padding:20px 16px 40px;width:100%;max-height:88vh;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.shandle{width:38px;height:5px;background:#d3d1c7;border-radius:3px;margin:0 auto 18px;}
.stitle{font-size:19px;font-weight:700;color:#1a1a18;margin-bottom:4px;}
.ssub{font-size:13px;color:#888780;margin-bottom:16px;}
.stext{font-size:14px;color:#1a1a18;line-height:1.8;white-space:pre-wrap;background:#faf9f6;border-radius:10px;padding:14px;margin-bottom:16px;}
.sbtnrow{display:-webkit-flex;display:flex;gap:10px;}
.sbtn{-webkit-flex:1;flex:1;padding:15px;font-size:15px;border-radius:12px;cursor:pointer;font-family:inherit;font-weight:700;border:none;-webkit-appearance:none;}
.sbtn:active{opacity:0.7;}
.sbtnc{background:#1D9E75;color:#fff;}
.sbtnd{background:#e8e6e0;color:#1a1a18;}
</style>
</head>
<body>

<div class="topbar">
  <span class="topbar-title">Recovery Capital</span>
  <span class="topbar-score" id="tscore">0 / 33</span>
</div>

<div class="page">

  <div class="card">
    <div class="card-title">Session Info</div>
    <div class="field">
      <label for="fdate">Date</label>
      <input type="date" id="fdate">
    </div>
    <div class="field">
      <label for="fpeer">Peer Specialist</label>
      <input type="text" id="fpeer" placeholder="Name">
    </div>
    <div class="field">
      <label for="floc">Location</label>
      <input type="text" id="floc" placeholder="e.g. Columbiana County Jail">
    </div>
  </div>

  <div class="card">
    <div class="srow"><span class="slabel">Personal</span><div class="strack"><div class="sfill" id="bp" style="width:0%"></div></div><span class="snum" id="np">0/10</span></div>
    <div class="srow"><span class="slabel">Social</span><div class="strack"><div class="sfill" id="bs" style="width:0%"></div></div><span class="snum" id="ns">0/8</span></div>
    <div class="srow"><span class="slabel">Community</span><div class="strack"><div class="sfill" id="bc" style="width:0%"></div></div><span class="snum" id="nc">0/8</span></div>
    <div class="srow"><span class="slabel">Spiritual</span><div class="strack"><div class="sfill" id="bsp" style="width:0%"></div></div><span class="snum" id="nsp">0/7</span></div>
    <div class="odivider"></div>
    <div class="orow"><span class="olabel">Overall</span><div class="otrack"><div class="ofill" id="bo" style="width:0%"></div></div><span class="onum" id="no">0/33</span></div>
  </div>

  <div id="dc"></div>

</div>

<div class="bottombar">
  <button class="btn btng" onclick="resetAll()">Reset</button>
  <button class="btn btnp" onclick="openSheet()">Generate Summary</button>
</div>

<div class="overlay" id="overlay" onclick="bgTap(event)">
  <div class="sheet" id="sheet">
    <div class="shandle"></div>
    <div class="stitle">Session Summary</div>
    <div class="ssub" id="ssub"></div>
    <div class="stext" id="stext"></div>
    <div class="sbtnrow">
      <button class="sbtn sbtnc" onclick="copyText()">Copy to clipboard</button>
      <button class="sbtn sbtnd" onclick="closeSheet()">Close</button>
    </div>
  </div>
</div>

<script>
var D=[
  {k:"p",bar:"bp",num:"np",label:"Personal & Internal",sub:"Health, coping skills, motivation",ibg:"#E1F5EE",ic:"#0F6E56",bc:"#1D9E75",
   items:["I have a stable sense of my identity in recovery","I can identify my personal triggers and warning signs","I have healthy coping strategies that I use regularly","I am motivated to maintain my sobriety","I am taking care of my physical health","I am addressing my mental health needs","I have goals I am working toward for my future","I believe recovery is possible for me","I can ask for help when I need it","I have a daily routine that supports my recovery"]},
  {k:"s",bar:"bs",num:"ns",label:"Social & Relational",sub:"Family, relationships, support network",ibg:"#E6F1FB",ic:"#185FA5",bc:"#378ADD",
   items:["I have at least one person I trust who supports my recovery","My family relationships are stable or improving","I have friendships that do not involve substance use","I can set healthy boundaries with people who threaten my recovery","I have or am working to find a sponsor, mentor, or recovery coach","I attend or plan to attend peer support or recovery meetings","I feel connected to others who understand recovery","I am able to communicate my needs to others"]},
  {k:"c",bar:"bc",num:"nc",label:"Community & Resources",sub:"Housing, employment, transportation, finances",ibg:"#FAEEDA",ic:"#854F0B",bc:"#BA7517",
   items:["I have or am actively working toward stable housing","I have income or a plan for financial stability","I have reliable transportation or access to it","I have valid identification (state ID, Social Security card, birth certificate)","I am connected to treatment or recovery support services","I have access to healthcare","I have or am working toward employment or education","I know how to access community resources when I need them"]},
  {k:"sp",bar:"bsp",num:"nsp",label:"Spiritual & Faith",sub:"Hope, purpose, meaning, community",ibg:"#EEEDFE",ic:"#534AB7",bc:"#7F77DD",
   items:["I have a sense of hope for my future","I feel a sense of purpose or meaning in my life","I have spiritual practices or beliefs that support my recovery","I am connected to a faith community or spiritual group","I have found or am finding peace and forgiveness for my past","I have values and principles that guide my decisions","I feel genuine gratitude for where I am in my recovery"]}
];

var state={};

function build(){
  var con=document.getElementById('dc');
  D.forEach(function(d){
    state[d.k]=[];
    for(var i=0;i<d.items.length;i++) state[d.k].push(false);
    var rows='';
    d.items.forEach(function(txt,i){
      rows+='<div class="irow" onclick="tap(\''+d.k+'\','+i+')"><div class="ichk" id="ck-'+d.k+'-'+i+'"></div><span class="itxt" id="lb-'+d.k+'-'+i+'">'+txt+'</span></div>';
    });
    var el=document.createElement('div');
    el.className='dcard';
    el.innerHTML='<div class="dhead" onclick="tog(\''+d.k+'\')"><div class="dicon" style="background:'+d.ibg+';color:'+d.ic+'">&#9679;</div><div class="dmeta"><div class="dname">'+d.label+'</div><div class="dsub">'+d.sub+'</div></div><span class="dbadge" id="bg-'+d.k+'">0/'+d.items.length+'</span><span class="dchev open" id="ch-'+d.k+'">&#9660;</span></div><div class="dbody open" id="bd-'+d.k+'">'+rows+'<div class="nwrap"><div class="nlabel">Peer specialist notes</div><textarea id="nt-'+d.k+'" placeholder="Observations, strengths, areas to explore..."></textarea></div></div>';
    con.appendChild(el);
  });
}

function tap(k,i){
  state[k][i]=!state[k][i];
  var v=state[k][i];
  var ck=document.getElementById('ck-'+k+'-'+i);
  var lb=document.getElementById('lb-'+k+'-'+i);
  v?ck.classList.add('on'):ck.classList.remove('on');
  v?lb.classList.add('on'):lb.classList.remove('on');
  score();
}

function score(){
  var tc=0,ti=0;
  D.forEach(function(d){
    var ch=state[d.k].filter(Boolean).length;
    var tot=d.items.length;
    var pct=Math.round((ch/tot)*100);
    document.getElementById(d.bar).style.width=pct+'%';
    document.getElementById(d.num).textContent=ch+'/'+tot;
    var bg=document.getElementById('bg-'+d.k);
    bg.textContent=ch+'/'+tot;
    ch===tot?bg.classList.add('done'):bg.classList.remove('done');
    tc+=ch;ti+=tot;
  });
  var op=Math.round((tc/ti)*100);
  document.getElementById('bo').style.width=op+'%';
  document.getElementById('no').textContent=tc+'/'+ti;
  document.getElementById('tscore').textContent=tc+' / '+ti;
}

function tog(k){
  var bd=document.getElementById('bd-'+k);
  var ch=document.getElementById('ch-'+k);
  var open=bd.classList.toggle('open');
  bd.style.display=open?'block':'none';
  open?ch.classList.add('open'):ch.classList.remove('open');
}

function resetAll(){
  if(!confirm('Reset all items and notes?')) return;
  D.forEach(function(d){
    for(var i=0;i<d.items.length;i++){
      state[d.k][i]=false;
      document.getElementById('ck-'+d.k+'-'+i).classList.remove('on');
      document.getElementById('lb-'+d.k+'-'+i).classList.remove('on');
    }
    document.getElementById('nt-'+d.k).value='';
  });
  document.getElementById('fdate').value=today();
  document.getElementById('fpeer').value='';
  document.getElementById('floc').value='Columbiana County Jail';
  score();
}

function openSheet(){
  var date=document.getElementById('fdate').value||'Not recorded';
  var peer=document.getElementById('fpeer').value||'Not recorded';
  var loc=document.getElementById('floc').value||'Not recorded';
  var tc=0,ti=0,lines=[];
  lines.push('RECOVERY CAPITAL CHECKLIST - SESSION SUMMARY');
  lines.push('Date: '+date+'   Peer Specialist: '+peer+'   Location: '+loc);
  lines.push('');
  D.forEach(function(d){
    var ch=state[d.k].filter(Boolean).length;
    var tot=d.items.length;
    var pct=Math.round((ch/tot)*100);
    tc+=ch;ti+=tot;
    var str=d.items.filter(function(_,i){return state[d.k][i];});
    var nds=d.items.filter(function(_,i){return !state[d.k][i];});
    var nt=document.getElementById('nt-'+d.k).value.trim();
    lines.push(d.label.toUpperCase()+' ('+ch+'/'+tot+' - '+pct+'%)');
    if(str.length) lines.push('  Strengths: '+str.join('; '));
    if(nds.length) lines.push('  Areas for development: '+nds.join('; '));
    if(nt) lines.push('  Notes: '+nt);
    lines.push('');
  });
  var op=Math.round((tc/ti)*100);
  lines.push('OVERALL RECOVERY CAPITAL: '+tc+' / '+ti+' ('+op+'%)');
  var tier='';
  if(op>=75) tier='Strong recovery capital foundation identified.';
  else if(op>=50) tier='Moderate recovery capital with clear areas for growth.';
  else if(op>=25) tier='Early-stage recovery capital; targeted support and resource development recommended.';
  else tier='Significant barriers identified; intensive reentry planning and resource linkage recommended.';
  lines.push(tier);
  document.getElementById('stext').textContent=lines.join('\n');
  document.getElementById('ssub').textContent=tc+' of '+ti+' items checked ('+op+'%)';
  document.getElementById('overlay').classList.add('open');
}

function closeSheet(){document.getElementById('overlay').classList.remove('open');}
function bgTap(e){if(e.target===document.getElementById('overlay')) closeSheet();}
function copyText(){
  var t=document.getElementById('stext').textContent;
  if(navigator.clipboard){
    navigator.clipboard.writeText(t).then(function(){
      var b=document.querySelector('.sbtnc');
      b.textContent='Copied!';
      setTimeout(function(){b.textContent='Copy to clipboard';},2000);
    });
  } else {
    var ta=document.createElement('textarea');
    ta.value=t;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    var b=document.querySelector('.sbtnc');
    b.textContent='Copied!';
    setTimeout(function(){b.textContent='Copy to clipboard';},2000);
  }
}

function today(){
  var d=new Date();
  var m=('0'+(d.getMonth()+1)).slice(-2);
  var day=('0'+d.getDate()).slice(-2);
  return d.getFullYear()+'-'+m+'-'+day;
}

build();
document.getElementById('fdate').value=today();
document.getElementById('floc').value='Columbiana County Jail';
</script>
</body>
</html>
